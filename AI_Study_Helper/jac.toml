[project]
name = "jactastic"
version = "0.1.0"
description = "A full-stack Jac application"
entry-point = "main.jac"

[dependencies]

[dependencies.npm]
jac-client-node = "1.0.4"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins.client]

[jacpack]
name = "AI_Study_Helper"
description = "My custom project template"
jaclang = "0.11.0"

[[jacpack.plugins]]
name = "jac-client"
version = "0.3.0"

[jacpack.options]
directories = [".jac"]
gitignore_entries = ["*"]
root_gitignore_entries = [".jac/"]
